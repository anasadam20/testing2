<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }
    h1 {
      color: #333;
    }
    .item {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px;
      background: #fff;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item button {
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .item button:hover {
      background: #218838;
    }
    #cart {
      margin-top: 30px;
      padding: 15px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    #cart h2 {
      margin-top: 0;
    }
    #cart ul {
      list-style: none;
      padding: 0;
    }
    #cart ul li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>🛒 Shopping App</h1>
  <div id="items"></div>

  <div id="cart">
    <h2>Your Cart</h2>
    <ul id="cart-list"></ul>
    <p><strong>Total:</strong> $<span id="cart-total">0</span></p>
  </div>

  <script>
    const items = [
      { id: 1, name: "Laptop", price: 800 },
      { id: 2, name: "Phone", price: 500 },
      { id: 3, name: "Headphones", price: 100 },
      { id: 4, name: "Smartwatch", price: 200 }
    ];

    const cart = [];
    const itemsContainer = document.getElementById("items");
    const cartList = document.getElementById("cart-list");
    const cartTotal = document.getElementById("cart-total");

    function renderItems() {
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <span><strong>${item.name}</strong> - $${item.price}</span>
          <button onclick="addToCart(${item.id})">Add to Cart</button>
        `;
        itemsContainer.appendChild(div);
      });
    }

    function addToCart(id) {
      const item = items.find(i => i.id === id);
      cart.push(item);
      renderCart();
    }

    function renderCart() {
      cartList.innerHTML = "";
      let total = 0;
      cart.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.name} - $${item.price}`;
        cartList.appendChild(li);
        total += item.price;
      });
      cartTotal.textContent = total;
    }

    renderItems();
  </script>
</body>
</html>
